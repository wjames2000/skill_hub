app:
  name: skill-hub
  env: development
  port: 8080
  version: 1.0.0

db:
  driver: postgres
  dsn: "host=localhost port=5432 user=skillhub password=skillhub dbname=skillhub sslmode=disable"
  max_open: 25
  max_idle: 10
  max_lifetime: 30m

redis:
  addr: "localhost:6379"
  password: ""
  db: 0

meili:
  host: "http://localhost:7700"
  api_key: ""

minio:
  endpoint: "localhost:9000"
  access_key: "skillhub"
  secret_key: "skillhub123"
  use_ssl: false
  bucket: "skills"

consul:
  addr: "localhost:8500"
  token: ""

github:
  tokens:
    - ""
  search_topics:
    - "skill"
    - "ai-assistant"
    - "copilot-plugin"
    - "cursor-rules"
    - "cline-plugin"
    - "windsurf-plugin"
  max_per_page: 100
  request_delay: 200

sync:
  full_sync_cron: "0 0 3 * * *"
  incremental_cron: "0 */6 * * *"
  incremental_days: 7
  concurrency: 5
  sync_timeout: 1800
  scan_enabled: false

asynq:
  enabled: true
  concurrency: 10

semgrep:
  enabled: false
  binary: "semgrep"
  rules: "p/default"
  timeout: 300

milvus:
  address: "localhost:19530"
  user: ""
  password: ""
  db_name: "skillhub"

embedding:
  base_url: "http://localhost:11434/v1"
  api_key: ""
  model: "nomic-embed-text"
  dims: 768

llm:
  base_url: "http://localhost:11434/v1"
  api_key: ""
  model: "qwen2.5:7b"
  max_tokens: 1024
  temperature: 0.1

reranker:
  base_url: "http://localhost:11434/v1"
  api_key: ""
  model: "bge-reranker-v2-m3"

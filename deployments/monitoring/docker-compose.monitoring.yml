name: skill-hub-monitoring

services:
  prometheus:
    image: prom/prometheus:v2.53
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - ./alerts.yml:/etc/prometheus/alerts.yml
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.console.libraries=/usr/share/prometheus/console_libraries"
      - "--web.console.templates=/usr/share/prometheus/consoles"
    networks:
      - skill-hub-mon-net

  grafana:
    image: grafana/grafana:11.1
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_INSTALL_PLUGINS: grafana-piechart-panel
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana-datasource.yml:/etc/grafana/provisioning/datasources/datasource.yml
    depends_on:
      - prometheus
    networks:
      - skill-hub-mon-net

  node-exporter:
    image: prom/node-exporter:v1.8
    ports:
      - "9100:9100"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - "--path.procfs=/host/proc"
      - "--path.sysfs=/host/sys"
      - "--path.rootfs=/rootfs"
    networks:
      - skill-hub-mon-net

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.15
    ports:
      - "9187:9187"
    environment:
      DATA_SOURCE_NAME: "postgresql://skillhub:skillhub@skill-hub-postgres:5432/skillhub?sslmode=disable"
    networks:
      - skill-hub-mon-net

volumes:
  prometheus-data:
  grafana-data:

networks:
  skill-hub-mon-net:
    driver: bridge

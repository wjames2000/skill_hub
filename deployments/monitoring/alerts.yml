groups:
  - name: skill-hub-alerts
    interval: 30s
    rules:
      - alert: ServiceDown
        expr: up{job="skill-hub-backend"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "SkillHub service {{ $labels.instance }} is down"
          description: "Service {{ $labels.instance }} has been unreachable for more than 1 minute."

      - alert: HighErrorRate
        expr: rate(http_requests_total{status=~"5.."}[5m]) / rate(http_requests_total[5m]) > 0.05
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High error rate on {{ $labels.instance }}"
          description: "5xx error rate is {{ $value | humanizePercentage }} over 5 minutes."

      - alert: HighLatency
        expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket[5m])) > 2
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High latency on {{ $labels.instance }}"
          description: "P95 latency is {{ $value }}s over 5 minutes."

      - alert: SyncFailure
        expr: skill_sync_job_failures_total > 10
        for: 1h
        labels:
          severity: warning
        annotations:
          summary: "Skill sync job failing frequently"
          description: "There have been {{ $value }} sync job failures in the last hour."

      - alert: DiskSpaceLow
        expr: node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"} < 0.15
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Low disk space on {{ $labels.instance }}"
          description: "Disk usage is {{ $value | humanizePercentage }} available."

      - alert: MemoryUsageHigh
        expr: container_memory_usage_bytes{namespace="skill-hub"} / container_spec_memory_limit_bytes{namespace="skill-hub"} > 0.85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High memory usage in skill-hub namespace"
          description: "Container memory usage is {{ $value | humanizePercentage }}."

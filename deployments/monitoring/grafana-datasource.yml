apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: false

  - name: PostgreSQL
    type: postgres
    access: proxy
    url: skill-hub-postgres:5432
    database: skillhub
    user: skillhub
    secureJsonData:
      password: skillhub
    jsonData:
      sslmode: disable
      postgresVersion: 1600

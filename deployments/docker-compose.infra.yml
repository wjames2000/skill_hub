name: skill-hub-infra

services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: skillhub
      POSTGRES_PASSWORD: skillhub
      POSTGRES_DB: skillhub
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ../backend/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U skillhub -d skillhub"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - skill-hub-infra-net

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - skill-hub-infra-net

  meilisearch:
    image: getmeili/meilisearch:v1.9
    ports:
      - "7700:7700"
    environment:
      MEILI_MASTER_KEY: skillhub-master-key
    volumes:
      - meili-data:/meili_data
    networks:
      - skill-hub-infra-net

  minio:
    image: minio/minio:latest
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: skillhub
      MINIO_ROOT_PASSWORD: skillhub123
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - skill-hub-infra-net

  consul:
    image: hashicorp/consul:1.18
    ports:
      - "8500:8500"
    command: agent -dev -client=0.0.0.0 -ui
    healthcheck:
      test: ["CMD", "consul", "info"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - skill-hub-infra-net

  milvus:
    image: milvusdb/milvus:v2.4.1
    ports:
      - "19530:19530"
    environment:
      ETCD_USE_EMBED: "true"
      COMMON_STORAGE_TYPE: local
    volumes:
      - milvus-data:/var/lib/milvus
    networks:
      - skill-hub-infra-net

volumes:
  postgres-data:
  redis-data:
  meili-data:
  minio-data:
  milvus-data:

networks:
  skill-hub-infra-net:
    driver: bridge
